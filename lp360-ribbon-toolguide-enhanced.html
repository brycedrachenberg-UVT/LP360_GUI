/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

    case 'measure': return s(`<svg width="28" height="28" viewBox="0 0 28 28"><rect x="4" y="14" width="20" height="6" rx="1.5" fill="${c.yellow}" stroke="${c.ink}" stroke-width="1.2"/><path d="M7 14v3 M10 14v2 M13 14v3 M16 14v2 M19 14v3 M22 14v2" stroke="${c.ink}" stroke-width="1.2"/></svg>`);

function renderIcon(it, size=28){
  if(it.icon && svgIcon(it.icon)) return `<div class="ic">${svgIcon(it.icon)}</div>`;
  return `<div class="ic"><i data-lucide="${it.icon||'square'}" width="${Math.min(size,28)}" height="${Math.min(size,28)}"></i></div>`;
}
function rLg(it){
  return `<div class="btn-lg ${it.d?'disabled':''} ${it.launch?'launch':''}" data-tip="${esc(it.tip)}">${renderIcon(it)}<div class="lbl">${lbl(it.l)}${it.c?' <span class="dropcaret">&#9662;</span>':''}</div></div>`;
}
function rSm(b){
  const icon = svgIcon(b.icon) ? svgIcon(b.icon) : `<i data-lucide="${b.icon||'square'}" width="15" height="15"></i>`;
  return `<div class="btn-sm ${b.d?'disabled':''} ${b.on?'on-sm':''}" data-tip="${esc(b.tip)}"><span class="ic">${icon}</span><span class="lbl">${b.l}</span>${b.c?' <span class="dropcaret">&#9662;</span>':''}</div>`;
}
function rRow(r){
  if(r.t==='select') return `<div class="field-row">${r.label?`<label>${r.label}</label>`:''}<div class="selectbox" style="min-width:${r.w||150}px" data-tip="${esc(r.tip)}"><span>${r.v||'&nbsp;'}</span><span class="dd">&#9662;</span></div></div>`;
  if(r.t==='check') return `<div class="field-row"><div class="check ${r.on?'on':''}" data-tip="${esc(r.tip)}"><span class="box">${r.on?CHECK:''}</span> ${r.l}</div></div>`;
  if(r.t==='btn'){ const icon = svgIcon(r.icon) ? svgIcon(r.icon) : `<i data-lucide="${r.icon||'square'}" width="15" height="15"></i>`; return `<div class="field-row"><div class="btn-sm ${r.d?'disabled':''}" data-tip="${esc(r.tip)}"><span class="ic">${icon}</span><span class="lbl">${r.l}</span>${r.c?' <span class="dropcaret">&#9662;</span>':''}</div></div>`; }
  return '';
}
function rItem(it){ if(it.t==='lg') return rLg(it); if(it.t==='list') return `<div class="btn-col">${it.b.map(rSm).join('')}</div>`; if(it.t==='fields') return `<div class="field-col">${it.r.map(rRow).join('')}</div>`; return ''; }
function rGroup(g){ return `<div class="group"><div class="group-body">${g.items.map(rItem).join('')}</div><div class="group-title">${g.title||'&nbsp;'}</div></div>`; }

const tip=document.getElementById('tooltip'); const ttTitle=tip.querySelector('.tt-title'); const ttBody=tip.querySelector('.tt-body'); const ttRef=tip.querySelector('.tt-ref');
function parseTip(el){ const raw=el.getAttribute('data-tip')||''; const parts=raw.split('|'); return {title:(parts[0]||'').trim(), body:(parts[1]||'').trim(), ref:(parts[2]||'').trim()}; }
function position(e){ const pad=14; let x=e.clientX+pad,y=e.clientY+pad; const r=tip.getBoundingClientRect(); if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
document.addEventListener('mouseover',e=>{ const el=e.target.closest('[data-tip]'); if(!el)return; const {title,body,ref}=parseTip(el); ttTitle.textContent=title; ttBody.textContent=body; ttRef.textContent=ref||''; tip.classList.add('show'); position(e); });
document.addEventListener('mousemove',e=>{ if(tip.classList.contains('show')) position(e); });
document.addEventListener('mouseout',e=>{ const el=e.target.closest('[data-tip]'); if(el && !el.contains(e.relatedTarget)) tip.classList.remove('show'); });

/* lightweight click handling */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-tip]'); if(!el) return;
  if(el.classList.contains('tab')) return;
  const {title,body}=parseTip(el);
  if(title==='Trajectory Processing' && el.classList.contains('btn-lg')){ openWizard(); status.textContent='Trajectory Processing wizard launched.'; return; }
  if(el.classList.contains('disabled')){ status.textContent=title+' is currently unavailable in this context.'; return; }
  if(el.classList.contains('check')){ el.classList.toggle('on'); el.querySelector('.box').innerHTML=el.classList.contains('on')?CHECK:''; if(window.lucide) lucide.createIcons(); }
  status.textContent='▶ '+title+' : '+body;
});

const wizard=document.getElementById('wizard'); const dialogs=[...wizard.querySelectorAll('.dialog')]; let step=0;
function showStep(i){ step=i; dialogs.forEach(d=>d.classList.toggle('active',+d.dataset.step===i)); if(window.lucide) lucide.createIcons(); }
function openWizard(){ wizard.classList.add('show'); showStep(0); if(window.lucide) lucide.createIcons(); }
function closeWizard(){ wizard.classList.remove('show'); }
wizard.addEventListener('click',e=>{
  if(e.target.closest('[data-next]')){ if(step<dialogs.length-1) showStep(step+1); }
  else if(e.target.closest('[data-prev]')){ if(step>0) showStep(step-1); }
  else if(e.target.closest('[data-cancel]')) closeWizard();
  else if(e.target.closest('[data-submit]')){ closeWizard(); toast('Trajectory processing job submitted to Applanix POSPac Cloud. Track it in Job Manager.'); }
  else if(e.target.closest('[data-gear]')) toast('Cycle Settings: opens per-cycle trajectory processing settings.');
  else if(e.target.closest('[data-baseobs]')) toast('Base Obs Files: attach or review base station observation files for the cycle.');
  else if(e.target.closest('[data-nail]')) document.getElementById('nailBackdrop').classList.add('show');
  else if(e.target.closest('[data-radio]')){ const el=e.target.closest('[data-radio]'); const grp=el.dataset.radio; el.closest('.dialog').querySelectorAll(`[data-radio="${grp}"]`).forEach(r=>r.classList.remove('on')); el.classList.add('on'); }
  else if(e.target.closest('.chk') && !e.target.closest('.chk').classList.contains('dis') && !e.target.closest('.grow')){ const c=e.target.closest('.chk'); c.classList.toggle('on'); c.querySelector('.cb').innerHTML=c.classList.contains('on')?'<i data-lucide="check" width="11" height="11"></i>':''; if(window.lucide) lucide.createIcons(); }
});
document.getElementById('nailBackdrop').addEventListener('click',e=>{ if(e.target.closest('[data-nailclose]')) document.getElementById('nailBackdrop').classList.remove('show'); });
const toastEl=document.getElementById('toast'),toastMsg=document.getElementById('toastMsg'); let tHide; function toast(msg){ toastMsg.textContent=msg; toastEl.classList.add('show'); clearTimeout(tHide); tHide=setTimeout(()=>toastEl.classList.remove('show'),3400); }
